---
- name: Install ripgrep (macOS)
  community.general.homebrew:
    name: ripgrep
    state: present
  when: ansible_facts["system"] == "Darwin"

- name: Install ripgrep (Linux)
  ansible.builtin.apt:
    name: ripgrep
    state: present
  become: true
  when: ansible_facts["os_family"] == "Debian"
