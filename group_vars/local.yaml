# Determines if iCloud Drive is symlinked to ~/iCloud
icloud_enabled: true

# macOS-only utilities that don't get installed by a role
mac_homebrew_packages:
  # User-contributed docs for Unix commands
  # NOTE: no arm64 linux builds are available, so only install this on macOS
  - tlrc
  # what's the wifi password?
  - wifi-password
  - qrtool # for generating QR codes

# Mac Apps to be installed with homebrew-cask
mac_cask_packages:
  # Password manager
  - 1password
  # Editor
  - visual-studio-code
  # Browsers
  - firefox
  # Maintained caffeinate wrapper
  - keepingyouawake
  # Utilities
  - bettertouchtool
  - appcleaner
  # More resource-efficient Docker
  - orbstack
  # chat
  - discord
  # Media/Music
  - iina
  # Images
  - imageoptim
  # Notetaking
  - obsidian
  # Database client
  - tableplus
  # REST client
  - insomnia
  # Screen captures and recording
  - cleanshot
  # VPN
  - tailscale-app
  # Color picker
  - pika
  # Malware scanner
  - knockknock
  # Firewall
  - lulu

# Mac-App-Store-only apps to be installed with mas
# Use App IDs found with `mas search <name>`
mac_mas_packages:
  # NOTE: the IDs can be found with `mas search <app name>`
  - { "id": 409203825, "name": "Numbers" }
