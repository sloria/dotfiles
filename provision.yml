# NOTE: Each role is tagged so that we can select individual roles to run with ansible-playbook --tags

- name: Common provisioning
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Update dotfiles repo
      ansible.builtin.git:
        repo: "git@github.com:sloria/dotfiles.git"
        dest: "{{ dotfiles_home }}"
        update: true
        version: main
      when: inventory_hostname != 'localhost'
      tags: always
  roles:
    - { role: git, tags: ["git"] }
    - { role: package_manager, tags: ["package_manager"] }
    - { role: zsh, tags: ["zsh"] }
    - { role: python, tags: ["python"] }
    - { role: mise, tags: ["mise"] }
    - { role: rust, tags: ["rust"] }
    - { role: neovim, tags: ["neovim"] }
    - { role: eza, tags: ["eza"] }
    - { role: bat, tags: ["bat"] }
    - { role: lctl, tags: ["lctl"] }
    - { role: macos, tags: ["macos"] }

- name: Local-only provisioning
  hosts: local
  roles:
    - { role: kubernetes, tags: ["kubernetes"] }
    - { role: jrnl, tags: ["jrnl"] }
    - { role: k9s, tags: ["k9s"] }
    - { role: ghostty, tags: ["ghostty"] }
