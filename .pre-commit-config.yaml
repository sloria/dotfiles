repos:
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        exclude: ^roles/neovim/files/(lazy-lock|lazyvim)\.json$
  - repo: https://github.com/ansible/ansible-lint
    rev: v25.9.2
    hooks:
      - id: ansible-lint
        files: ^ansible/.*\.ya?ml$
